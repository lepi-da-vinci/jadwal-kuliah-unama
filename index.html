<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Jadwal Kuliah</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236366f1'%3E%3Cpath d='M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header class="header">
      <h1>Jadwal Kuliah</h1>
      <div class="header-actions">
        <button id="clear-db-btn" class="btn btn-danger" aria-label="Bersihkan database">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            <line x1="10" y1="11" x2="10" y2="17" />
            <line x1="14" y1="11" x2="14" y2="17" />
          </svg>
          Bersihkan DB
        </button>
        <button id="sync-btn" class="btn btn-primary" aria-label="Sinkronisasi jadwal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10" />
            <polyline points="1 20 1 14 7 14" />
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
          </svg>
          Sinkron
        </button>
        <div class="stats-row" id="stat-container">
          <div class="stat-badge">Memuat statistik...</div>
        </div>
        <button id="theme-toggle" class="btn btn-ghost" aria-label="Ganti tema gelap terang">
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
      </div>
    </header>

    <div class="card">
      <div class="filters">
        <div class="filter-group">
          <label for="filter-tanggal">Tanggal</label>
          <input type="date" id="filter-tanggal" autocomplete="off">
        </div>
        <div class="filter-group">
          <label for="filter-waktu">Waktu</label>
          <select id="filter-waktu">
            <option value="sekarang">Jadwal Saat Ini (Otomatis)</option>
            <option value="semua" selected>Semua Waktu</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-metode">Status Kuliah</label>
          <select id="filter-metode">
            <option value="semua">Semua Status</option>
            <option value="TM">Tatap Muka (TM)</option>
            <option value="OL">Online (OL)</option>
            <option value="CC">Cancel (CC)</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-kampus">Lokasi Kampus</label>
          <select id="filter-kampus">
            <option value="semua">Semua Kampus</option>
            <option value="Kampus Kobar">Kampus Kobar</option>
            <option value="Kampus Thehok">Kampus Thehok</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-kategori-ruang">Kategori Ruangan</label>
          <select id="filter-kategori-ruang">
            <option value="semua">Semua Kategori</option>
            <option value="labor">Labor</option>
            <option value="kelas">Kelas</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-ruangan">Ruangan / Labor</label>
          <select id="filter-ruangan">
            <option value="semua">Semua Ruangan</option>
          </select>
        </div>
      </div>

      <div class="panels-row">
        <div class="panel panel-lab" id="active-lab-panel">
          <h3>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
              <line x1="8" y1="21" x2="16" y2="21" />
              <line x1="12" y1="17" x2="12" y2="21" />
            </svg>
            Labor yang lagi di pakai
          </h3>
          <div class="panel-content" id="active-lab-list"><em>Memeriksa status lab...</em></div>
        </div>
        <div class="panel panel-notif" id="notifikasi-lab-panel">
          <h3>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            Info mase
          </h3>
          <div class="panel-content" id="notifikasi-lab-list"><em>Memuat notifikasi...</em></div>
        </div>
      </div>

      <div id="info-jadwal-sekarang" class="alert" role="alert" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="16" x2="12" y2="12" />
          <line x1="12" y1="8" x2="12.01" y2="8" />
        </svg>
        <span>Menampilkan jadwal yang sedang berlangsung (berdasarkan jam sekarang).</span>
      </div>

      <div class="card-header">
        <div id="hasil-pencarian" class="search-result">Hasil Pencarian: 0 jadwal</div>
        <button id="test-notif-btn" class="btn btn-warning" aria-label="Test notifikasi">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          Test Notif
        </button>
      </div>

      <div class="table-wrap">
        <table id="jadwal-table">
          <thead>
            <tr>
              <th scope="col" width="15%">Waktu</th>
              <th scope="col" width="25%">Mata Kuliah</th>
              <th scope="col" width="20%">Dosen</th>
              <th scope="col" width="20%">Ruangan</th>
              <th scope="col" width="10%">Status</th>
              <th scope="col" width="10%">Metode</th>
            </tr>
          </thead>
          <tbody id="jadwal-tbody">
            <tr>
              <td colspan="6" class="text-center text-muted">Memuat data...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="lab-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Notifikasi Lab">
    <div class="modal-box">
      <div class="modal-icon">🔔</div>
      <h2>We Buka Lab, Ges!</h2>
      <div class="modal-body" id="lab-modal-body"></div>
      <button class="modal-btn" id="modal-close-btn">Oke, Gas!</button>
    </div>
  </div>

  <script>
    const API_BASE_URL = (window.location.protocol === 'file:') ? 'http://127.0.0.1:8000' : window.location.origin;
    let allJadwal = [];

    const tbody = document.getElementById('jadwal-tbody');
    const filterTanggal = document.getElementById('filter-tanggal');
    const filterWaktu = document.getElementById('filter-waktu');
    const filterMetode = document.getElementById('filter-metode');
    const filterRuangan = document.getElementById('filter-ruangan');
    const infoSekarang = document.getElementById('info-jadwal-sekarang');

    function updateStats(data) {
      const container = document.getElementById('stat-container');
      if (data.length === 0) {
        container.innerHTML = '<div class="stat-badge">Tidak ada data</div>';
        return;
      }
      let tmCount = 0, olCount = 0, ccCount = 0;
      data.forEach(item => {
        if (item.metode_pembelajaran === 'TM') tmCount++;
        else if (item.metode_pembelajaran === 'OL') olCount++;
        else if (item.metode_pembelajaran === 'CC') ccCount++;
      });
      container.innerHTML = `
        <div class="stat-badge tm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          TM: ${tmCount} Kelas
        </div>
        <div class="stat-badge ol">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          OL: ${olCount} Kelas
        </div>
        <div class="stat-badge cc">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          CC: ${ccCount} Kelas
        </div>
      `;
    }

    function showSkeleton() {
      const rows = Array.from({ length: 5 }, () =>
        `<tr class="skeleton-row">${'<td class="skeleton">Memuat</td>'.repeat(6)}</tr>`
      ).join('');
      tbody.innerHTML = rows;
    }

    async function fetchAllJadwal() {
      try {
        showSkeleton();
        const response = await fetch(`${API_BASE_URL}/api/jadwal`);
        const data = await response.json();
        if (data.status === 'success') {
          allJadwal = data.data.map(item => {
            if (item.nama_ruangan) item.nama_ruangan = item.nama_ruangan.trim();
            return item;
          });
          populateFilters();
          applyFilters();
        }
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center" style="color:var(--badge-cc);">Gagal memuat data jadwal.</td></tr>';
      }
    }

    fetchAllJadwal();

    function updateRuanganDropdown() {
      const fk = document.getElementById('filter-kategori-ruang').value;
      const fKampus = document.getElementById('filter-kampus').value;
      const ruanganSet = new Set();
      allJadwal.forEach(item => {
        if (!item.nama_ruangan) return;
        if (fKampus !== 'semua' && item.kampus && item.kampus.trim() !== fKampus) return;
        if (fk === 'labor') { if (isLab(item.nama_ruangan)) ruanganSet.add(item.nama_ruangan); }
        else if (fk === 'kelas') { if (!isLab(item.nama_ruangan)) ruanganSet.add(item.nama_ruangan); }
        else { ruanganSet.add(item.nama_ruangan); }
      });
      const oldVal = filterRuangan.value;
      filterRuangan.innerHTML = '<option value="semua">Semua Ruangan</option>';
      Array.from(ruanganSet).sort().forEach(ruang => {
        const opt = document.createElement('option');
        opt.value = ruang; opt.textContent = ruang;
        filterRuangan.appendChild(opt);
      });
      filterRuangan.value = ruanganSet.has(oldVal) ? oldVal : 'semua';
    }

    function populateFilters() {
      const waktuSet = new Set();
      allJadwal.forEach(item => { if (item.jam) waktuSet.add(item.jam); });
      filterWaktu.innerHTML = '<option value="sekarang">Jadwal Saat Ini (Otomatis)</option><option value="semua" selected>Semua Waktu</option>';
      Array.from(waktuSet).sort().forEach(waktu => {
        const opt = document.createElement('option');
        opt.value = waktu; opt.textContent = `Pukul ${waktu}`;
        filterWaktu.appendChild(opt);
      });
      updateRuanganDropdown();
    }

    function renderTable(data) {
      const hasilLabel = document.getElementById('hasil-pencarian');
      hasilLabel.innerHTML = `Hasil Pencarian: <strong style="color:var(--primary);">${data.length} jadwal</strong> ditemukan`;
      tbody.innerHTML = '';
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">Tidak ada jadwal yang sesuai dengan filter.</td></tr>';
        return;
      }
      data.forEach(item => {
        let badgeClass = 'default';
        if (item.metode_pembelajaran === 'TM') badgeClass = 'tm';
        else if (item.metode_pembelajaran === 'OL') badgeClass = 'ol';
        else if (item.metode_pembelajaran === 'CC') badgeClass = 'cc';
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><strong>${item.jam}</strong><br><small>${item.hari}, ${item.tanggal_format || item.tanggal}</small></td>
          <td>${item.nama_mk || '-'} ${item.kelas ? `<br><small style="color:var(--badge-tm);font-weight:bold;">(Kelas: ${item.kelas})</small>` : ''}</td>
          <td>${item.nama_dosen || '-'}</td>
          <td>${item.nama_ruangan || '-'}</td>
          <td>${item.status_jadwal}</td>
          <td><span class="badge ${badgeClass}">${item.metode_pembelajaran}</span></td>
        `;
        tbody.appendChild(row);
      });
    }

    function isLab(namaRuangan) {
      if (!namaRuangan) return false;
      const name = namaRuangan.toLowerCase();
      return name.includes('lab') || /\b3\.1\b/.test(name) || /\b3\.4\b/.test(name);
    }

    function applyFilters() {
      const ft = filterTanggal.value;
      fetchNotifikasiLab(ft);

      const fw = filterWaktu.value;
      const fm = filterMetode.value;
      const fr = filterRuangan.value;
      const fk = document.getElementById('filter-kategori-ruang').value;
      const fKampus = document.getElementById('filter-kampus').value;

      let filtered = allJadwal;
      infoSekarang.style.display = 'none';

      if (ft) filtered = filtered.filter(item => item.tanggal === ft);

      if (fw === 'sekarang') {
        infoSekarang.style.display = 'flex';
        const now = new Date();
        const currentTime = now.getHours() * 60 + now.getMinutes();
        filtered = filtered.filter(item => {
          if (!item.jam) return false;
          const parts = item.jam.split(':');
          const startTime = parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
          return (currentTime >= startTime) && (currentTime <= startTime + 135);
        });
      } else if (fw !== 'semua') {
        filtered = filtered.filter(item => item.jam === fw);
      }

      if (fm !== 'semua') filtered = filtered.filter(item => item.metode_pembelajaran === fm);
      if (fr !== 'semua') filtered = filtered.filter(item => item.nama_ruangan === fr);
      if (fk === 'labor') filtered = filtered.filter(item => isLab(item.nama_ruangan));
      else if (fk === 'kelas') filtered = filtered.filter(item => !isLab(item.nama_ruangan));
      if (fKampus !== 'semua') filtered = filtered.filter(item => item.kampus && item.kampus.trim() === fKampus);

      filtered.sort((a, b) => {
        const aIsLab = isLab(a.nama_ruangan);
        const bIsLab = isLab(b.nama_ruangan);
        if (aIsLab && !bIsLab) return -1;
        if (!aIsLab && bIsLab) return 1;
        if (a.jam && b.jam) { if (a.jam < b.jam) return -1; if (a.jam > b.jam) return 1; }
        return 0;
      });

      updateStats(filtered);
      renderTable(filtered);
      updateActiveLabPanel();
    }

    function updateActiveLabPanel() {
      const panel = document.getElementById('active-lab-list');
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const currentDayStr = `${year}-${month}-${day}`;
      const currentTime = now.getHours() * 60 + now.getMinutes();
      let activeLabs = [];

      allJadwal.forEach(item => {
        if (item.tanggal === currentDayStr && item.jam && isLab(item.nama_ruangan)) {
          const parts = item.jam.split(':');
          const startTime = parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
          if (currentTime >= startTime && currentTime <= startTime + 135) {
            activeLabs.push(`<b>${item.nama_ruangan}</b>: ${item.nama_mk} (${item.jam})`);
          }
        }
      });

      panel.innerHTML = activeLabs.length > 0
        ? `<ul>${activeLabs.map(lab => `<li>${lab}</li>`).join('')}</ul>`
        : '<em>Lagi dak da lab yang dipakai.</em>';
    }

    setInterval(updateActiveLabPanel, 60000);

    async function syncData(tanggal) {
      const syncBtn = document.getElementById('sync-btn');
      const originalHtml = syncBtn.innerHTML;
      syncBtn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
        Menarik Data...
      `;
      syncBtn.disabled = true;

      try {
        const response = await fetch(`${API_BASE_URL}/api/sync`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tanggal: tanggal || null })
        });
        const result = await response.json();

        if (result.status === 'success') {
          syncBtn.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
            Merender...
          `;
          await fetchAllJadwal();
          fetchNotifikasiLab(tanggal, true);
        } else {
          alert("Gagal sinkronisasi: " + result.message);
        }
      } catch (error) {
        console.error("Error saat sinkronisasi:", error);
        alert("Terjadi kesalahan jaringan atau server.");
      }

      syncBtn.innerHTML = originalHtml;
      syncBtn.disabled = false;
    }

    async function fetchNotifikasiLab(tanggal, showPopup = false) {
      const notifList = document.getElementById('notifikasi-lab-list');
      if (!notifList) return;
      if (!tanggal) {
        notifList.innerHTML = '<em>pilih tanggal tuk cek notif mas.</em>';
        return;
      }
      try {
        notifList.innerHTML = '<em>Memuat notifikasi...</em>';
        const response = await fetch(`${API_BASE_URL}/api/notifikasi-lab?tanggal=${tanggal}`);
        const data = await response.json();

        if (data.status === 'success' && data.data && data.data.length > 0) {
          let html = '', popupContent = '';
          data.data.forEach(n => {
            let cls = '';
            if (n.tipe_notif === 'TAMBAHAN') {
              cls = 'tambah';
              if (showPopup) popupContent += `<div class="notif-item tambah"><strong>KELAS TAMBAHAN!</strong><br>${n.pesan}</div>`;
            } else if (n.tipe_notif === 'PERUBAHAN') { cls = 'perubahan'; }
            else if (n.tipe_notif === 'JEDA') { cls = 'jeda'; }
            html += `<div class="notif-item ${cls}"><div class="notif-header"><span>${n.tipe_notif}</span><span class="notif-time">${n.waktu}</span></div><div>${n.pesan}</div></div>`;
          });
          notifList.innerHTML = html;
          if (showPopup && popupContent) {
            document.getElementById('lab-modal-body').innerHTML = popupContent;
            openModal();
          }
        } else {
          notifList.innerHTML = '<em>Tidak ada notifikasi khusus pada tanggal ini.</em>';
        }
      } catch (e) {
        notifList.innerHTML = '<em style="color:var(--badge-cc);">Gagal memuat notifikasi.</em>';
      }
    }

    filterTanggal.addEventListener('change', (e) => {
      syncData(e.target.value);
      applyFilters();
    });

    document.getElementById('sync-btn').addEventListener('click', () => syncData(filterTanggal.value));

    document.getElementById('clear-db-btn').addEventListener('click', async () => {
      if (confirm("Yakin ingin menghapus SELURUH data jadwal dari database? Tindakan ini tidak bisa dibatalkan.")) {
        const btn = document.getElementById('clear-db-btn');
        btn.disabled = true;
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
          Menghapus...
        `;
        try {
          const response = await fetch(`${API_BASE_URL}/api/jadwal`, { method: 'DELETE' });
          const result = await response.json();
          if (result.status === 'success') { alert(result.message); await fetchAllJadwal(); }
          else { alert("Gagal menghapus database: " + result.message); }
        } catch (e) { alert("Terjadi kesalahan saat menghapus database."); }
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg> Bersihkan DB`;
      }
    });

    filterWaktu.addEventListener('change', applyFilters);
    filterMetode.addEventListener('change', applyFilters);
    filterRuangan.addEventListener('change', applyFilters);
    document.getElementById('filter-kategori-ruang').addEventListener('change', () => { updateRuanganDropdown(); applyFilters(); });
    document.getElementById('filter-kampus').addEventListener('change', () => {
        updateRuanganDropdown();
        applyFilters();
    });

    // 6. Auto-Sync setiap 30 menit
    setInterval(() => {
        const currentDate = filterTanggal.value;
        if (currentDate) {
            console.log("Menjalankan Auto-Sync untuk tanggal:", currentDate);
            syncData(currentDate);
        }
    }, 30 * 60 * 1000); // 30 menit dalam milidetik

    // ─── Modal Logic ───
    const modal = document.getElementById('lab-modal');
    const modalBody = document.getElementById('lab-modal-body');
    const modalCloseBtn = document.getElementById('modal-close-btn');

    function openModal() {
      modal.classList.add('open');
      playNotificationSound();
      modalCloseBtn.focus();
    }

    function closeModal() {
      modal.classList.remove('open');
    }

    modalCloseBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modal.classList.contains('open')) closeModal(); });

    // ─── Notification Sound ───
    function playNotificationSound() {
      try { const audio = new Audio('notif.mp3'); audio.play().catch(() => playDefaultTone()); }
      catch (e) { playDefaultTone(); }
    }

    function playDefaultTone() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, startTime, duration) {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTime);
          gain.gain.setValueAtTime(0, audioCtx.currentTime + startTime);
          gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + startTime + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + startTime + duration);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(audioCtx.currentTime + startTime);
          osc.stop(audioCtx.currentTime + startTime + duration);
        }
        playTone(880, 0, 0.3);
        playTone(1108.73, 0.15, 0.5);
      } catch (e) { console.log("Browser memblokir autoplay suara."); }
    }

    // ─── Lab Check ───
    function checkLabNotifications() {
      const now = new Date();
      const currentTotalMin = now.getHours() * 60 + now.getMinutes();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const currentDayStr = `${year}-${month}-${day}`;

      let firstClasses = {};
      allJadwal.forEach(item => {
        if (item.tanggal === currentDayStr && item.metode_pembelajaran !== 'CC' && item.jam && isLab(item.nama_ruangan)) {
          const parts = item.jam.split(':');
          const startTotalMin = parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
          if (!firstClasses[item.nama_ruangan] || startTotalMin < firstClasses[item.nama_ruangan].startTotalMin) {
            firstClasses[item.nama_ruangan] = { nama_mk: item.nama_mk, jam: item.jam, startTotalMin };
          }
        }
      });

      let labToNotify = [];
      for (const [ruang, dataClass] of Object.entries(firstClasses)) {
        const diffMin = dataClass.startTotalMin - currentTotalMin;
        if (diffMin === 30 || diffMin === 15) {
          labToNotify.push(`<b>${ruang}</b> buat matkul <b>${dataClass.nama_mk}</b> (Mulai jam ${dataClass.jam}) - <i>Gass buka dalam ${diffMin} menit!</i>`);
        }
      }

      if (labToNotify.length > 0) {
        modalBody.innerHTML = '<p>Buka labor ni sekarang, kelas entar lagi mulai:</p><ul>' + labToNotify.map(l => `<li style="margin-bottom:8px;">${l}</li>`).join('') + '</ul>';
        openModal();
      }
    }

    setInterval(checkLabNotifications, 60000);
    setTimeout(checkLabNotifications, 1000);

    // ─── Test Notification ───
    document.getElementById('test-notif-btn').addEventListener('click', () => {
      modalBody.innerHTML = '<p>Buka labor ni sekarang ges, kelas bentar lagi mulai:</p><ul><li style="margin-bottom:8px;"><b>Labora Uji Coba (Kampus Dummy)</b> buat matkul <b>Pemrograman Web</b> (Mulai jam 10:00) - <i>Gass buka dalam 30 menit!</i></li></ul>';
      openModal();
    });

    // ─── Theme Toggle ───
    const themeToggle = document.getElementById('theme-toggle');
    const sunIcon = themeToggle.querySelector('.sun-icon');
    const moonIcon = themeToggle.querySelector('.moon-icon');

    const currentTheme = localStorage.getItem('theme') || 'light';
    if (currentTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      moonIcon.style.display = 'none';
      sunIcon.style.display = '';
    }

    themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
        moonIcon.style.display = '';
        sunIcon.style.display = 'none';
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        moonIcon.style.display = 'none';
        sunIcon.style.display = '';
      }
    });

    // ─── Spin animation ───
    const style = document.createElement('style');
    style.textContent = `@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`;
    document.head.appendChild(style);
  </script>
</body>
